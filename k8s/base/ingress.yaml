apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcart-ingress
  namespace: mcart
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api/search/products
            pathType: Prefix
            backend:
              service:
                name: mcart-product-search-service
                port:
                  number: 8081
          - path: /api/search
            pathType: Prefix
            backend:
              service:
                name: mcart-product-search-service
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcart-product-service
                port:
                  number: 8080
