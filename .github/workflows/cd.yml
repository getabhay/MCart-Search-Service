name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/getabhay/mcart-product-search-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy to EC2 k3s
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
            k() { sudo k3s kubectl --request-timeout=60s "$@"; }
            retry() { for i in 1 2 3 4 5; do "$@" && return 0; sleep 10; done; return 1; }

            retry k apply --validate=false -f /opt/mcart-product-search-service/k8s/base/namespace.yaml
            retry k apply --validate=false -f /opt/mcart-product-search-service/k8s/base/configmap.yaml
            retry k create secret generic mcart-shared-secrets -n mcart \
              --from-literal=AWS_ACCESS_KEY='${{ secrets.AWS_ACCESS_KEY }}' \
              --from-literal=AWS_SECRET_KEY='${{ secrets.AWS_SECRET_KEY }}' \
              --from-literal=DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              --from-literal=ES_BASE64_API_KEY='${{ secrets.ES_BASE64_API_KEY }}' \
              --dry-run=client -o yaml | retry k apply --validate=false -f -
            retry k apply --validate=false -f /opt/mcart-product-search-service/k8s/base/deployment.yaml
            retry k apply --validate=false -f /opt/mcart-product-search-service/k8s/base/service.yaml
            retry k apply --validate=false -f /opt/mcart-product-search-service/k8s/base/ingress.yaml
            retry k set image deployment/mcart-product-search-service mcart-product-search-service="$IMAGE" -n mcart
            retry k rollout status deployment/mcart-product-search-service -n mcart --timeout=240s
